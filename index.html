<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortuna Labs — Members</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0A0A12;
  --bg-card: #111318;
  --gold: #C8B060;
  --gold-light: #D4A840;
  --gold-dim: #9A8A50;
  --gold-glow: rgba(200, 176, 96, 0.12);
  --gold-line: rgba(200, 176, 96, 0.15);
  --red: #f87171;
  --text: #E8E4D8;
  --text-dim: #8A8678;
  --border: rgba(200, 176, 96, 0.12);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.glow-ring {
  position: fixed;
  border-radius: 50%;
  border: 1px solid rgba(200, 176, 96, 0.04);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.glow-ring:nth-child(1) { width: 500px; height: 500px; }
.glow-ring:nth-child(2) { width: 700px; height: 700px; border-color: rgba(200, 176, 96, 0.025); }
.glow-ring:nth-child(3) { width: 900px; height: 900px; border-color: rgba(200, 176, 96, 0.015); }

.login-box {
  position: relative;
  z-index: 1;
  width: 380px;
  text-align: center;
}
.lab-name {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(2rem, 4vw, 2.8rem);
  letter-spacing: 10px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.lab-sub {
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 48px;
}
.line {
  width: 50px;
  height: 1px;
  background: var(--gold-line);
  margin: 0 auto 40px;
}
.members-label {
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: 16px;
  text-align: left;
}
.form-group label {
  display: block;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.3s;
}
.form-group input:focus {
  border-color: var(--gold-dim);
}
.form-group input::placeholder {
  color: rgba(138, 134, 120, 0.5);
}

.login-btn {
  width: 100%;
  background: var(--gold);
  color: var(--bg);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 14px;
  border: none;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.3s;
}
.login-btn:hover {
  background: var(--gold-light);
  letter-spacing: 5px;
}

.error-msg {
  color: var(--red);
  font-size: 12px;
  margin-top: 16px;
  min-height: 18px;
  opacity: 0;
  transition: opacity 0.3s;
}
.error-msg.show { opacity: 1; }

.back-link {
  display: inline-block;
  margin-top: 40px;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.3s;
}
.back-link:hover { color: var(--gold); }
</style>
</head>
<body>
<div class="glow-ring"></div>
<div class="glow-ring"></div>
<div class="glow-ring"></div>

<div class="login-box">
  <div class="lab-name">Fortuna</div>
  <div class="lab-sub">Labs</div>
  <div class="line"></div>
  <div class="members-label">Members Area</div>

  <form id="loginForm">
    <div class="form-group">
      <label>Login</label>
      <input type="text" id="username" placeholder="Enter login" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    <button type="submit" class="login-btn">Enter</button>
  </form>
  <div class="error-msg" id="errorMsg">Invalid credentials</div>

  <a href="https://www.fortunalabs.net" class="back-link">← fortunalabs.net</a>
</div>

<script>
// Check if already authenticated
if (sessionStorage.getItem('fortuna_auth') === 'true') {
  window.location.href = 'dashboard.html';
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var u = document.getElementById('username').value;
  var p = document.getElementById('password').value;
  
  if (u === 'Fortuna' && p === 'Secret1') {
    sessionStorage.setItem('fortuna_auth', 'true');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('errorMsg').classList.add('show');
    setTimeout(function() {
      document.getElementById('errorMsg').classList.remove('show');
    }, 3000);
  }
});
</script>
</body>
</html>
